name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: "Security: Dependency Audit"
        run: npm audit --audit-level=high

      - name: "Security: Secret Scanning"
        run: |
          echo "Scanning for hardcoded secrets in src/..."
          if grep -rEn '(apikey|api_key|password|secret|token)\s*[=:]' src/ \
            --include='*.js' --include='*.ts' --include='*.jsx' --include='*.tsx' --include='*.json' --include='*.yml' --include='*.yaml' \
            --exclude='.env.example' --exclude='package-lock.json' \
            --exclude-dir='node_modules'; then
            echo "::error::Potential secrets detected in source code!"
            exit 1
          else
            echo "No hardcoded secrets found."
          fi

      - name: "Security: License Check"
        run: npx license-checker --production --failOn 'GPL'
